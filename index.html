<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FutbolGO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --green: #00E676;
        --green-dim: #00c853;
        --green-glow: rgba(0, 230, 118, 0.3);
        --bg: #080808;
        --card: #111111;
        --card2: #161616;
        --border: #222222;
        --text: #ffffff;
        --muted: #666666;
        --danger: #FF1744;
      }

      body {
        font-family: 'Manrope', sans-serif;
        background: var(--bg);
        color: var(--text);
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        overflow-x: hidden;
      }

      h1, h2, h3 {
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 1px;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      @keyframes glow {
        0%, 100% { box-shadow: 0 0 10px var(--green-glow); }
        50% { box-shadow: 0 0 24px var(--green-glow), 0 0 48px var(--green-glow); }
      }

      .fade-up {
        animation: fadeUp 0.4s ease forwards;
      }

      .skeleton {
        background: linear-gradient(90deg, #1a1a1a 25%, #242424 50%, #1a1a1a 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 8px;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      button {
        font-family: 'Manrope', sans-serif;
      }

      input, textarea {
        font-family: 'Manrope', sans-serif;
      }

      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
